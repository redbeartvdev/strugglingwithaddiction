services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swa
      POSTGRES_PASSWORD: swa_dev_password
      POSTGRES_DB: swa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swa -d swa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
