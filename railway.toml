# Config path is from repo root (does not follow per-service Root Directory).
# Service settings: Root Directory = empty (repo root), Config file = /railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/bin/sh /app/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
