# Prefer repo-root railway.toml when Root Directory is "."
# If this service still uses Root Directory "backend", change it to "." in Railway settings.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Shell form so $PORT expands; do not use exec-form `uvicorn ... --port $PORT` in the Railway UI.
startCommand = "/bin/sh /app/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
