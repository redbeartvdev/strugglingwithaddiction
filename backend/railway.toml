# Used only if this service's config file is set to /backend/railway.toml
# (API-only build; Root Directory = backend). Prefer repo-root /railway.toml + Root Directory empty.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/bin/sh /app/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
