# Auto-deploy on push to main: Railway (API + static site + admin).
# Required secrets: RAILWAY_TOKEN, RAILWAY_SERVICE_ID — see DEPLOYMENT.md

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate Railway secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN is not set. Railway → Project → Settings → Tokens → project token."
            exit 1
          fi
          if [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "::error::RAILWAY_SERVICE_ID is not set."
            exit 1
          fi

      - name: Build frontends into backend/static
        run: ./scripts/prepare-railway-static.sh

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        run: railway up --ci --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Sync blog posts to database
        working-directory: backend
        run: railway run --service "${{ secrets.RAILWAY_SERVICE_ID }}" python scripts/sync_blog.py
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
